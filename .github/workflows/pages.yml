name: Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# GitHub Pages 有効化とデプロイに必要な最小権限
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: チェックアウト
        uses: actions/checkout@v5

      - name: Pages を設定
        uses: actions/configure-pages@v5

      - name: web/ を artifact としてアップロード
        uses: actions/upload-pages-artifact@v4
        with:
          path: web

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
